---
name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  pull_request:
    branches:
      - main

jobs:
  make:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build on Ubuntu
        shell: bash
        run: |
          bash '.github/workflows/make.sh'
