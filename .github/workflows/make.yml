---
name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - windows-latest
        arch:
          - x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash '.github/workflows/make.sh'

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          pwsh -File '.github/workflows/make.ps1'
